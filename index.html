<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Profil Karyawan - Lanyard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #0a4f2b; 
      --primary-light: #e8f5e9;
      --text-dark: #111827;
      --text-gray: #4b5563;
      --text-light: #9ca3af;
      --bg-light: #f3f4f6;
      --white: #ffffff;
      --border: #e5e7eb;
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
    }

    .app-header {
      background-color: var(--primary);
      color: var(--white);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header-logo { font-weight: 700; font-size: 20px; font-style: italic; }
    .app-header-title { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    
    .pattern-bar {
      height: 30px;
      background: repeating-linear-gradient(45deg, #0a4f2b, #0a4f2b 10px, #10663a 10px, #10663a 20px);
      position: relative;
    }
    .pattern-bar-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--primary);
      color: var(--white);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-style: italic;
      border: 3px solid var(--white);
      font-size: 12px;
      text-align: center;
      line-height: 1;
      z-index: 10;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }

    /* Main Profile Card (ID Card) */
    .profile-hero {
      background: var(--white);
      border-radius: 16px;
      padding: 30px;
      display: flex;
      align-items: center;
      gap: 30px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    /* Decorate ID card for html2canvas */
    .profile-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: var(--primary);
    }
    .hero-avatar {
      width: 140px; height: 140px;
      border-radius: 50%;
      object-fit: cover;
      background-color: var(--primary-light);
      border: 4px solid var(--primary-light);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .hero-info { flex: 1; }
    .hero-name { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .hero-jabatan { font-size: 16px; font-weight: 600; color: var(--success); margin-bottom: 4px; }
    .hero-id { font-size: 14px; color: var(--text-gray); margin-bottom: 16px; font-family: monospace; font-weight: 600; background: var(--bg-light); padding: 4px 10px; border-radius: 8px; display: inline-block; }
    .hero-badges { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { background: var(--primary-light); color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }

    /* Sticky Nav Tabs Wrapper */
    .nav-tabs-wrapper {
      position: sticky;
      top: 56px; /* Below header */
      z-index: 90;
      background: var(--bg-light);
      padding: 10px 0;
      margin-bottom: 14px;
    }
    .nav-tabs {
      display: flex;
      background: var(--white);
      border-radius: 12px;
      padding: 8px;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    
    .nav-tab {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-gray);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .nav-tab:hover { background: var(--bg-light); }
    .nav-tab.active {
      color: var(--primary);
      border-bottom: 3px solid var(--primary);
      border-radius: 8px 8px 0 0;
      background: transparent;
    }

    /* Section Cards */
    .section-card {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 24px;
    }
    .section-header {
      font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .section-header i { color: var(--primary); }

    /* Info Grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 40px; }
    .info-item { display: flex; flex-direction: column; gap: 4px; }
    .info-label { font-size: 13px; color: var(--text-gray); font-weight: 500; }
    .info-value { font-size: 15px; color: var(--text-dark); font-weight: 600; }

    /* Contact List */
    .contact-item { display: flex; align-items: center; justify-content: space-between; }
    .contact-left { display: flex; align-items: center; gap: 16px; }
    .contact-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .contact-name { font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
    .contact-phone { font-size: 14px; color: var(--text-gray); }
    .contact-actions { display: flex; gap: 8px; }
    
    .btn { padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; transition: all 0.2s; justify-content: center; }
    .btn:active { transform: scale(0.98); }
    .btn-outline { background: var(--white); color: var(--text-dark); border: 1px solid var(--border); }
    .btn-whatsapp { background: #25D366; color: var(--white); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-green { background: #10b981; color: white; }

    /* Share & ID Card Section */
    .action-box {
      background: var(--bg-light);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: 10px;
      border: 1px dashed var(--border);
    }
    .url-input-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .url-input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      color: var(--text-gray);
      font-size: 14px;
      outline: none;
    }
    #qrcode {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      padding: 16px;
      background: var(--white);
      border-radius: 12px;
      display: inline-block;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    #qrcode img { margin: 0 auto; border-radius: 8px; }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #111827;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Utilities */
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text-gray); }
    .footer-dark { background: var(--primary); color: var(--white); text-align: center; padding: 24px; font-size: 13px; margin-top: 40px; }
    
    @media (max-width: 640px) {
      .profile-hero { flex-direction: column; text-align: center; gap: 20px; }
      .hero-badges { justify-content: center; }
      .info-grid { grid-template-columns: 1fr; }
      .contact-item { flex-direction: column; align-items: stretch; gap: 16px; text-align: center; }
      .contact-actions { display: grid; grid-template-columns: 1fr 1fr; }
      .url-input-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="app-header-logo">Los Ciken</div>
    <div class="app-header-title">Profil Karyawan <i class="fas fa-check-circle"></i></div>
  </header>
  <div class="pattern-bar">
    <div class="pattern-bar-logo">Los<br>Ciken</div>
  </div>

  <div id="app">
    <div class="loading-screen" id="loading">
      <i class="fas fa-spinner fa-spin fa-3x" style="margin-bottom: 16px; color: var(--primary)"></i>
      <p style="font-weight: 500;">Mencari data karyawan...</p>
    </div>
  </div>

  <div id="toast" class="toast">Berhasil disalin!</div>

  <!-- Footer -->
  <footer class="footer-dark">
    <div style="margin-bottom: 8px;"><i class="fas fa-shield-check"></i> Data bersifat rahasia. Hanya untuk keperluan internal Los Ciken.</div>
    <div>&copy; 2024 Los Ciken. All rights reserved.</div>
  </footer>

  <script>
    const sheetId = '1kjiHj3J5pX_V0ZbMiyl6dnAQ99oHxPDQ2G0q69bJUlg';
    const sheetGid = '343518669'; 
    const urlParams = new URLSearchParams(window.location.search);
    const employeeId = urlParams.get('id');

    // Langsung dieksekusi, tidak menunggu window.onload agar tidak terhalang loading gambar/aset lambat
    if (!employeeId) {
      showSearchForm();
    } else {
      fetchData(employeeId);
    }

    // Fungsi untuk meload library external hanya saat dibutuhkan (menghindari error loading terus-menerus di awal)
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) return resolve();
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function showSearchForm() {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="profile-hero" style="flex-direction: column; text-align: center; padding: 40px 20px;">
            <i class="fas fa-id-badge fa-4x" style="color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin: 0 0 10px; color: var(--text-dark);">Pemindai Lanyard</h2>
            <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 24px;">Silakan masukkan ID Karyawan untuk melihat profil.</p>
            <form onsubmit="searchId(event)" style="width: 100%; max-width: 300px; margin: 0 auto;">
              <input type="text" id="manual-id" placeholder="Contoh: LS-001" style="padding: 14px; width: 100%; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 16px; font-size: 16px; text-align: center; outline: none;">
              <br>
              <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Lihat Profil</button>
            </form>
          </div>
        </div>
      `;
    }

    function searchId(event) {
      event.preventDefault();
      const id = document.getElementById('manual-id').value.trim();
      if (id) window.location.href = window.location.pathname + '?id=' + id;
    }

    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="profile-hero" style="flex-direction: column; text-align: center; padding: 40px 20px;">
            <i class="fas fa-exclamation-circle fa-4x" style="color: #ef4444; margin-bottom: 20px;"></i>
            <h2 style="margin: 0 0 10px; color: var(--text-dark);">Ups, terjadi kesalahan</h2>
            <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 24px;">${message}</p>
            <button onclick="window.location.href=window.location.pathname" class="btn btn-outline">Kembali</button>
          </div>
        </div>
      `;
    }

    // Scroll Observer for sticky tabs highlighting
    function setupScrollSpy() {
      const sections = document.querySelectorAll('.section-card');
      const tabs = document.querySelectorAll('.nav-tab');
      
      window.addEventListener('scroll', () => {
        let current = '';
        sections.forEach(section => {
          const sectionTop = section.offsetTop;
          if (window.scrollY >= sectionTop - 160) {
            current = section.getAttribute('id');
          }
        });

        tabs.forEach(tab => {
          tab.classList.remove('active');
          if (tab.getAttribute('data-target') === current) {
            tab.classList.add('active');
            // Auto scroll the horizontal tabs if out of view
            tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        });
      });
    }

    function scrollToSection(id) {
      const element = document.getElementById(id);
      if (element) {
        const y = element.getBoundingClientRect().top + window.scrollY - 130;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function copyLink() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        showToast('Link berhasil disalin!');
      }).catch(err => {
        showToast('Gagal menyalin link');
      });
    }

    function downloadVirtualID(empId) {
      const btn = document.getElementById('btn-download');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyiapkan...';
      btn.style.opacity = '0.8';

      // Load html2canvas dynamically
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
        .then(() => {
          const target = document.getElementById('capture-id');
          target.style.boxShadow = 'none';
          target.style.borderRadius = '0';
          target.style.margin = '0';

          html2canvas(target, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff'
          }).then(canvas => {
            target.style.boxShadow = '';
            target.style.borderRadius = '';
            target.style.margin = '';
            
            const link = document.createElement('a');
            link.download = `ID_Card_${empId}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            btn.innerHTML = originalText;
            btn.style.opacity = '1';
            showToast('ID Card berhasil diunduh!');
          }).catch(err => {
            target.style.boxShadow = '';
            target.style.borderRadius = '';
            target.style.margin = '';
            btn.innerHTML = originalText;
            btn.style.opacity = '1';
            showToast('Gagal membuat gambar ID Card');
            console.error(err);
          });
        })
        .catch(err => {
          btn.innerHTML = originalText;
          btn.style.opacity = '1';
          showToast('Gagal memuat library. Pastikan internet lancar.');
        });
    }

    function renderData(data) {
      const waNumber = data.telepon ? data.telepon.replace(/\D/g, '') : '';
      const currentUrl = window.location.href;

      document.getElementById('app').innerHTML = `
        <div class="container">
          
          <!-- Hero Card (Will be captured as Virtual ID) -->
          <div class="profile-hero" id="capture-id">
            <img src="${data.foto}" alt="Foto Profil" class="hero-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(data.namaLengkap)}&background=0a4f2b&color=fff&size=150'">
            <div class="hero-info">
              <h1 class="hero-name">${data.namaLengkap}</h1>
              <div class="hero-jabatan">${data.jabatan}</div>
              <div class="hero-id"><i class="fas fa-fingerprint"></i> ${data.id}</div>
              <div class="hero-badges">
                <span class="badge"><i class="fas fa-check-circle"></i> ${data.status}</span>
                <span class="badge"><i class="fas fa-map-marker-alt"></i> ${data.cabang}</span>
                <span class="badge"><i class="fas fa-briefcase"></i> ${data.divisi}</span>
              </div>
            </div>
          </div>

          <!-- Sticky Nav Tabs -->
          <div class="nav-tabs-wrapper">
            <div class="nav-tabs">
              <div class="nav-tab active" data-target="sec-info" onclick="scrollToSection('sec-info')">
                <i class="fas fa-user"></i> Info Pribadi
              </div>
              <div class="nav-tab" data-target="sec-kontak" onclick="scrollToSection('sec-kontak')">
                <i class="fas fa-phone-alt"></i> Telepon Karyawan
              </div>
              <div class="nav-tab" data-target="sec-share" onclick="scrollToSection('sec-share')">
                <i class="fas fa-share-alt"></i> Bagikan Link
              </div>
              <div class="nav-tab" data-target="sec-idcard" onclick="scrollToSection('sec-idcard')">
                <i class="fas fa-id-card"></i> Virtual ID Card
              </div>
            </div>
          </div>

          <!-- 1. Info Pribadi -->
          <div id="sec-info" class="section-card">
            <div class="section-header"><i class="fas fa-user"></i> Info Pribadi</div>
            <div class="info-grid">
              <div class="info-item">
                <span class="info-label">Nama Lengkap</span>
                <span class="info-value">${data.namaLengkap}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Tanggal Bergabung</span>
                <span class="info-value">${data.tanggalBergabung}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Divisi</span>
                <span class="info-value">${data.divisi}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Email Kantor</span>
                <span class="info-value">${data.email}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Jabatan</span>
                <span class="info-value">${data.jabatan}</span>
              </div>
              <div class="info-item">
                <span class="info-label">ID Karyawan</span>
                <span class="info-value">${data.id}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Cabang / Penempatan</span>
                <span class="info-value">${data.cabang}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Status</span>
                <span class="info-value">
                  <span style="background:var(--primary-light); color:var(--primary); padding:4px 10px; border-radius:12px; font-size:12px; font-weight:bold;">${data.status}</span>
                </span>
              </div>
            </div>
          </div>

          <!-- 2. Telepon Karyawan -->
          <div id="sec-kontak" class="section-card">
            <div class="section-header"><i class="fas fa-phone-alt"></i> Kontak Karyawan</div>
            <p style="color:var(--text-gray); font-size:14px; margin-bottom:20px;">Hubungi karyawan ini secara langsung melalui nomor di bawah ini.</p>
            <div class="contact-item">
              <div class="contact-left">
                <div class="contact-avatar"><i class="fas fa-user"></i></div>
                <div>
                  <div class="contact-name">${data.namaLengkap}</div>
                  <div class="contact-phone">${data.telepon}</div>
                </div>
              </div>
              <div class="contact-actions">
                <a href="tel:${data.telepon}" class="btn btn-outline"><i class="fas fa-phone-alt"></i> Telepon</a>
                <a href="https://wa.me/${waNumber}" target="_blank" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
              </div>
            </div>
          </div>

          <!-- 3. Bagikan Link Profil -->
          <div id="sec-share" class="section-card">
            <div class="section-header"><i class="fas fa-share-alt"></i> Bagikan Halaman Profil</div>
            <p style="color:var(--text-gray); font-size:14px;">Gunakan link atau QR Code di bawah ini untuk membagikan halaman profil karyawan ini.</p>
            
            <div class="action-box">
              <div class="url-input-group">
                <input type="text" class="url-input" value="${currentUrl}" readonly onclick="this.select()">
                <button class="btn btn-primary" onclick="copyLink()"><i class="fas fa-copy"></i> Salin Link</button>
              </div>
              
              <div style="margin-top: 24px;">
                <p style="font-size:13px; color:var(--text-gray); font-weight:600; margin-bottom:10px;">Atau Tunjukkan QR Code</p>
                <div id="qrcode"></div>
              </div>
            </div>
          </div>

          <!-- 4. Virtual ID Card -->
          <div id="sec-idcard" class="section-card">
            <div class="section-header"><i class="fas fa-id-card"></i> Virtual ID Card</div>
            <p style="color:var(--text-gray); font-size:14px; margin-bottom:20px;">Unduh profil di atas dalam bentuk gambar sebagai ID Card Virtual. Cocok untuk disimpan di galeri atau dibagikan ke sosmed.</p>
            
            <div class="action-box" style="padding: 30px 20px;">
              <i class="fas fa-image fa-3x" style="color: var(--primary); margin-bottom: 16px;"></i>
              <h3 style="margin-bottom: 16px; font-size: 16px;">Simpan Kartu Identitas</h3>
              <button id="btn-download" class="btn btn-green" onclick="downloadVirtualID('${data.id}')">
                <i class="fas fa-download"></i> Unduh Gambar ID Card
              </button>
            </div>
          </div>

        </div>
      `;

      // Generate QR Code dynamically
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js')
        .then(() => {
          new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 150,
            height: 150,
            colorDark : "#0a4f2b",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
          });
        })
        .catch(err => {
          document.getElementById("qrcode").innerHTML = "<p style='color:red;font-size:12px;'>Gagal memuat QR Code</p>";
        });

      // Setup scroll spy for tabs
      setupScrollSpy();
    }

    function fetchData(id) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${sheetGid}`;
      
      fetch(url)
        .then(res => {
          if (!res.ok) throw new Error("Akses ditolak.");
          return res.text();
        })
        .then(text => {
          const startIndex = text.indexOf('{');
          const endIndex = text.lastIndexOf('}');
          if (startIndex === -1 || endIndex === -1) throw new Error("Sheet diprivate.");
          
          const jsonStr = text.substring(startIndex, endIndex + 1);
          const data = JSON.parse(jsonStr);
          const rows = data.table.rows;
          
          let found = null;
          for (let i = 3; i < rows.length; i++) {
             const row = rows[i].c;
             if (row && row[0] && row[0].v === id) {
               let tgl = '-';
               if (row[16]) tgl = row[16].f || row[16].v || '-';

               found = {
                 id: (row[0] && row[0].v) || '-',
                 namaLengkap: (row[2] && row[2].v) || '-',
                 email: (row[3] && row[3].v) || '-',
                 telepon: (row[4] && row[4].v) || '-',
                 foto: (row[6] && row[6].v) || 'https://via.placeholder.com/150',
                 jabatan: (row[14] && row[14].v) || '-',
                 cabang: (row[15] && row[15].v) || '-',
                 tanggalBergabung: String(tgl),
                 status: (row[18] && row[18].v) || '-',
                 divisi: (row[14] && row[14].v) || '-'
               };
               break;
             }
          }
          
          if (found) renderData(found);
          else showError("Data ID " + id + " tidak ditemukan.");
        })
        .catch(err => {
          console.error(err);
          showError(err.message);
        });
    }
  </script>
</body>
</html>
