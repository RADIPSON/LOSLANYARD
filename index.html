<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profil Karyawan - Lanyard</title>

    <!-- PWA / Meta Tags -->
    <meta name="theme-color" content="#0b0b0c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="icon.png">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* dynamic viewport height, lebih akurat di browser mobile */
            overflow: hidden; /* Mencegah scroll ganda */
            background-color: #f5f7f9; /* Sesuaikan dengan warna background lanyard */
        }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            border: none;
            display: block;
            background-color: transparent;
            /* perhitungkan safe-area (notch, home indicator) */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            color: #666;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="loading">Memuat...</div>
    <iframe id="app-frame" allowfullscreen></iframe>

    <script>
        // 1. Ambil URL Web App Apps Script Anda
        const baseUrl = "https://script.google.com/macros/s/AKfycby2qYYpCk-FEoGH5m5Ux24ms5C8zWWy8MMxI9dVkhGWtkVwabVLKNmJ5TBbYP6q6VW9/exec";

        // 2. Ambil parameter ?id= dari URL GitHub Pages
        const urlParams = new URLSearchParams(window.location.search);
        const idKaryawan = urlParams.get('id');

        // 3. Gabungkan URL Apps Script dengan Parameter ID
        let finalUrl = baseUrl;
        if (idKaryawan) {
            finalUrl += "?id=" + encodeURIComponent(idKaryawan);
        }

        // 4. Masukkan ke iframe
        document.getElementById('app-frame').src = finalUrl;
    </script>

</body>
</html>
