<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Profil Karyawan - Lanyard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #0a4f2b; 
      --primary-light: #e8f5e9;
      --text-dark: #111827;
      --text-gray: #4b5563;
      --text-light: #9ca3af;
      --bg-light: #f3f4f6;
      --white: #ffffff;
      --border: #e5e7eb;
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
    }

    .app-header {
      background-color: var(--primary);
      color: var(--white);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header-logo { font-weight: 700; font-size: 20px; font-style: italic; }
    .app-header-title { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    
    .pattern-bar {
      height: 30px;
      background: repeating-linear-gradient(45deg, #0a4f2b, #0a4f2b 10px, #10663a 10px, #10663a 20px);
      position: relative;
    }
    .pattern-bar-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--primary);
      color: var(--white);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-style: italic;
      border: 3px solid var(--white);
      font-size: 12px;
      text-align: center;
      line-height: 1;
      z-index: 10;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }

    /* Main Profile Header */
    .profile-hero {
      background: var(--white);
      border-radius: 16px;
      padding: 30px;
      display: flex;
      align-items: center;
      gap: 30px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .hero-avatar {
      width: 140px; height: 140px;
      border-radius: 50%;
      object-fit: cover;
      background-color: var(--primary-light);
      border: 4px solid var(--primary-light);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .hero-info { flex: 1; }
    .hero-name { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .hero-jabatan { font-size: 16px; font-weight: 600; color: var(--success); margin-bottom: 4px; }
    .hero-id { font-size: 14px; color: var(--text-gray); margin-bottom: 16px; font-family: monospace; font-weight: 600; background: var(--bg-light); padding: 4px 10px; border-radius: 8px; display: inline-block; }
    .hero-badges { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { background: var(--primary-light); color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }

    /* Sticky Nav Tabs Wrapper */
    .nav-tabs-wrapper {
      position: sticky;
      top: 56px;
      z-index: 90;
      background: var(--bg-light);
      padding: 10px 0;
      margin-bottom: 14px;
    }
    .nav-tabs {
      display: flex;
      background: var(--white);
      border-radius: 12px;
      padding: 8px;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    
    .nav-tab {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-gray);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .nav-tab:hover { background: var(--bg-light); }
    .nav-tab.active {
      color: var(--primary);
      border-bottom: 3px solid var(--primary);
      border-radius: 8px 8px 0 0;
      background: transparent;
    }

    /* Section Cards */
    .section-card {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 24px;
      scroll-margin-top: 140px; 
    }
    .section-header {
      font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .section-header i { color: var(--primary); }

    /* Info Grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 40px; }
    .info-item { display: flex; flex-direction: column; gap: 4px; }
    .info-label { font-size: 13px; color: var(--text-gray); font-weight: 500; }
    .info-value { font-size: 15px; color: var(--text-dark); font-weight: 600; }

    /* Contact List */
    .contact-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); }
    .contact-item:last-child { border-bottom: none; padding-bottom: 0; }
    .contact-left { display: flex; align-items: center; gap: 16px; }
    .contact-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .contact-name { font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
    .contact-phone { font-size: 14px; color: var(--text-gray); }
    .contact-actions { display: flex; gap: 8px; }
    
    .btn { padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; transition: all 0.2s; justify-content: center; }
    .btn:active { transform: scale(0.98); }
    .btn-outline { background: var(--white); color: var(--text-dark); border: 1px solid var(--border); }
    .btn-whatsapp { background: #25D366; color: var(--white); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-green { background: #10b981; color: white; }
    .btn-link { background: var(--white); color: var(--text-dark); border: 1px solid var(--border); width: 100%; justify-content: flex-start; padding: 16px; margin-bottom: 12px; }

    /* Org Chart */
    .org-chart { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
    .org-node { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; text-align: center; min-width: 220px; position: relative; }
    .org-node.active { background: var(--primary-light); border-color: var(--primary); border-width: 2px; }
    .org-title { font-size: 12px; color: var(--text-gray); font-weight: 600; margin-bottom: 4px; }
    .org-node.active .org-title { color: var(--primary); }
    .org-name { font-size: 14px; font-weight: 700; color: var(--text-dark); }
    .org-line { width: 2px; height: 30px; background: var(--border); }

    /* Virtual ID Card Preview */
    .id-card-wrapper {
      width: 100%; max-width: 320px; margin: 0 auto;
      background: var(--white); border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden; position: relative;
    }
    .id-card-header {
      background: var(--primary); padding: 20px; text-align: center; color: var(--white);
    }
    .id-card-body { padding: 30px 20px; text-align: center; }
    .id-card-footer {
      background: var(--primary-light); padding: 12px; text-align: center; font-size: 11px; color: var(--primary); font-weight: 600;
    }

    .url-input-group { display: flex; gap: 10px; margin-top: 16px; }
    .url-input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); color: var(--text-gray); font-size: 14px; outline: none; }
    
    #qrcode, #idcard-qrcode { display: inline-block; padding: 16px; background: var(--white); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    #idcard-qrcode { box-shadow: none; padding: 0; margin-top: 20px; }
    #idcard-qrcode img { margin: 0 auto; border-radius: 6px; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #111827; color: white; padding: 12px 24px; border-radius: 30px;
      font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text-gray); }
    .footer-dark { background: var(--primary); color: var(--white); text-align: center; padding: 24px; font-size: 13px; margin-top: 40px; }
    
    @media (max-width: 640px) {
      .profile-hero { flex-direction: column; text-align: center; gap: 20px; }
      .hero-badges { justify-content: center; }
      .info-grid { grid-template-columns: 1fr; }
      .contact-item { flex-direction: column; align-items: stretch; gap: 16px; text-align: center; }
      .contact-actions { display: grid; grid-template-columns: 1fr 1fr; }
      .url-input-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-header-logo">Los Ciken</div>
    <div class="app-header-title">Profil Karyawan <i class="fas fa-check-circle"></i></div>
  </header>
  <div class="pattern-bar">
    <div class="pattern-bar-logo">Los<br>Ciken</div>
  </div>

  <div id="app">
    <div class="loading-screen" id="loading">
      <i class="fas fa-spinner fa-spin fa-3x" style="margin-bottom: 16px; color: var(--primary)"></i>
      <p style="font-weight: 500;">Mencari data karyawan...</p>
    </div>
  </div>

  <div id="toast" class="toast">Notifikasi</div>

  <footer class="footer-dark">
    <div style="margin-bottom: 8px;"><i class="fas fa-shield-check"></i> Data bersifat rahasia. Hanya untuk keperluan internal.</div>
    <div>&copy; 2024 Los Ciken. All rights reserved.</div>
  </footer>

  <script>
    const sheetId = '1kjiHj3J5pX_V0ZbMiyl6dnAQ99oHxPDQ2G0q69bJUlg';
    const sheetGid = '343518669'; 
    const urlParams = new URLSearchParams(window.location.search);
    const employeeId = urlParams.get('id');

    if (!employeeId) {
      showSearchForm();
    } else {
      fetchData(employeeId);
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) return resolve();
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function showSearchForm() {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="profile-hero" style="flex-direction: column; text-align: center; padding: 40px 20px;">
            <i class="fas fa-id-badge fa-4x" style="color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin: 0 0 10px; color: var(--text-dark);">Pemindai Lanyard</h2>
            <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 24px;">Silakan masukkan ID Karyawan untuk melihat profil.</p>
            <form onsubmit="searchId(event)" style="width: 100%; max-width: 300px; margin: 0 auto;">
              <input type="text" id="manual-id" placeholder="Contoh: LS-001" style="padding: 14px; width: 100%; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 16px; font-size: 16px; text-align: center; outline: none;">
              <br>
              <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Lihat Profil</button>
            </form>
          </div>
        </div>
      `;
    }

    function searchId(event) {
      event.preventDefault();
      const id = document.getElementById('manual-id').value.trim();
      if (id) window.location.href = window.location.pathname + '?id=' + id;
    }

    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="profile-hero" style="flex-direction: column; text-align: center; padding: 40px 20px;">
            <i class="fas fa-exclamation-circle fa-4x" style="color: #ef4444; margin-bottom: 20px;"></i>
            <h2 style="margin: 0 0 10px; color: var(--text-dark);">Ups, terjadi kesalahan</h2>
            <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 24px;">${message}</p>
            <button onclick="window.location.href=window.location.pathname" class="btn btn-outline">Kembali</button>
          </div>
        </div>
      `;
    }

    function setupScrollSpy() {
      const sections = document.querySelectorAll('.section-card');
      const tabs = document.querySelectorAll('.nav-tab');
      
      window.addEventListener('scroll', () => {
        let current = '';
        sections.forEach(section => {
          const sectionTop = section.offsetTop;
          if (window.scrollY >= sectionTop - 160) {
            current = section.getAttribute('id');
          }
        });

        tabs.forEach(tab => {
          tab.classList.remove('active');
          if (tab.getAttribute('data-target') === current) {
            tab.classList.add('active');
            tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        });
      });
    }

    function scrollToSection(id) {
      const element = document.getElementById(id);
      if (element) {
        const y = element.getBoundingClientRect().top + window.scrollY - 130;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        showToast('Link berhasil disalin!');
      }).catch(() => showToast('Gagal menyalin link'));
    }

    function downloadQR() {
      const qrImg = document.querySelector('#qrcode img');
      if (qrImg && qrImg.src) {
        const link = document.createElement('a');
        link.download = `QR_Profile_${employeeId}.png`;
        link.href = qrImg.src;
        link.click();
        showToast('QR Code berhasil diunduh!');
      } else {
        showToast('Gambar QR Code belum siap.');
      }
    }

    function downloadVirtualID(empId) {
      const btn = document.getElementById('btn-download');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyiapkan...';
      btn.style.opacity = '0.8';

      loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
        .then(() => {
          const target = document.getElementById('virtual-id-preview');
          target.style.boxShadow = 'none';
          
          html2canvas(target, { scale: 3, useCORS: true, allowTaint: true, backgroundColor: null }).then(canvas => {
            target.style.boxShadow = '';
            const link = document.createElement('a');
            link.download = `ID_Card_${empId}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            btn.innerHTML = originalText;
            btn.style.opacity = '1';
            showToast('ID Card berhasil diunduh!');
          }).catch(err => {
            target.style.boxShadow = '';
            btn.innerHTML = originalText;
            btn.style.opacity = '1';
            showToast('Gagal membuat gambar ID Card');
            console.error(err);
          });
        })
        .catch(() => {
          btn.innerHTML = originalText;
          btn.style.opacity = '1';
          showToast('Gagal memuat library pemroses gambar.');
        });
    }

    function buildOrgChart(divisi, jabatan, nama) {
      let divHead = "Kepala Divisi " + divisi;
      let d = (divisi || '').toLowerCase();
      let j = (jabatan || '').toLowerCase();

      if(d.includes("operasional")) divHead = "Kepala Divisi Operasional";
      else if(d.includes("human resource")) divHead = "Kepala Human Resource";
      else if(d.includes("finance")) divHead = "Kepala Divisi Finance";

      let html = '<div class="org-chart">';
      
      if (j === 'direktur') {
        return html + `<div class="org-node active"><div class="org-title">Direktur</div><div class="org-name">${nama}</div></div></div>`;
      }
      
      html += `<div class="org-node"><div class="org-title">Direktur</div></div>`;
      html += `<div class="org-line"></div>`;

      if (j === 'wakil direktur') {
        return html + `<div class="org-node active"><div class="org-title">Wakil Direktur</div><div class="org-name">${nama}</div></div></div>`;
      }

      html += `<div class="org-node"><div class="org-title">Wakil Direktur</div></div>`;
      html += `<div class="org-line"></div>`;

      // Check if employee is the head of division
      if (j === divHead.toLowerCase() || j === "kepala " + d || j === "manager " + d) {
        html += `<div class="org-node active"><div class="org-title">${jabatan}</div><div class="org-name">${nama}</div></div>`;
      } else {
        html += `<div class="org-node"><div class="org-title">${divHead}</div></div>`;
        html += `<div class="org-line"></div>`;
        html += `<div class="org-node active"><div class="org-title">${jabatan}</div><div class="org-name">${nama}</div></div>`;
      }

      return html + '</div>';
    }

    function renderData(data) {
      const waSelf = data.telepon ? data.telepon.replace(/[^0-9+]/g, '') : '';
      const waEmergency = data.kontakDarurat.telepon ? data.kontakDarurat.telepon.replace(/[^0-9+]/g, '') : '';
      const currentUrl = window.location.href;

      document.getElementById('app').innerHTML = `
        <div class="container">
          
          <!-- Hero Card -->
          <div class="profile-hero">
            <img src="${data.foto}" crossorigin="anonymous" alt="Foto" class="hero-avatar" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(data.namaLengkap)}&background=0a4f2b&color=fff&size=150'">
            <div class="hero-info">
              <h1 class="hero-name">${data.namaLengkap}</h1>
              <div class="hero-jabatan">${data.jabatan}</div>
              <div class="hero-id"><i class="fas fa-fingerprint"></i> ${data.id}</div>
              <div class="hero-badges">
                <span class="badge"><i class="fas fa-check-circle"></i> ${data.status}</span>
                <span class="badge"><i class="fas fa-map-marker-alt"></i> ${data.cabang}</span>
                <span class="badge"><i class="fas fa-briefcase"></i> ${data.divisi}</span>
              </div>
            </div>
          </div>

          <!-- Sticky Nav Tabs -->
          <div class="nav-tabs-wrapper">
            <div class="nav-tabs">
              <div class="nav-tab active" data-target="sec-info" onclick="scrollToSection('sec-info')">
                <i class="fas fa-user"></i> Info Pribadi
              </div>
              <div class="nav-tab" data-target="sec-kontak" onclick="scrollToSection('sec-kontak')">
                <i class="fas fa-phone-alt"></i> Kontak
              </div>
              <div class="nav-tab" data-target="sec-struktur" onclick="scrollToSection('sec-struktur')">
                <i class="fas fa-sitemap"></i> Struktur
              </div>
              <div class="nav-tab" data-target="sec-perusahaan" onclick="scrollToSection('sec-perusahaan')">
                <i class="fas fa-building"></i> Info Perusahaan
              </div>
              <div class="nav-tab" data-target="sec-idcard" onclick="scrollToSection('sec-idcard')">
                <i class="fas fa-id-card"></i> QR & ID Card
              </div>
            </div>
          </div>

          <!-- 1. Info Pribadi -->
          <div id="sec-info" class="section-card">
            <div class="section-header"><i class="fas fa-user"></i> Info Pribadi</div>
            <div class="info-grid">
              <div class="info-item"><span class="info-label">Nama Lengkap</span><span class="info-value">${data.namaLengkap}</span></div>
              <div class="info-item"><span class="info-label">Tanggal Bergabung</span><span class="info-value">${data.tanggalBergabung}</span></div>
              <div class="info-item"><span class="info-label">Divisi</span><span class="info-value">${data.divisi}</span></div>
              <div class="info-item"><span class="info-label">Email Kantor</span><span class="info-value">${data.email}</span></div>
              <div class="info-item"><span class="info-label">Jabatan</span><span class="info-value">${data.jabatan}</span></div>
              <div class="info-item"><span class="info-label">ID Karyawan</span><span class="info-value">${data.id}</span></div>
              <div class="info-item"><span class="info-label">Cabang / Penempatan</span><span class="info-value">${data.cabang}</span></div>
              <div class="info-item"><span class="info-label">Status</span><span class="info-value"><span style="background:var(--primary-light); color:var(--primary); padding:4px 10px; border-radius:12px; font-size:12px; font-weight:bold;">${data.status}</span></span></div>
            </div>
          </div>

          <!-- 2. Kontak & Telepon -->
          <div id="sec-kontak" class="section-card">
            <div class="section-header"><i class="fas fa-phone-alt"></i> Kontak & Telepon</div>
            
            <p style="font-size: 13px; font-weight: 600; color: var(--text-gray); margin-bottom: 10px; text-transform: uppercase;">Hubungi Karyawan</p>
            <div class="contact-item" style="margin-bottom: 24px;">
              <div class="contact-left">
                <div class="contact-avatar"><i class="fas fa-user-circle"></i></div>
                <div><div class="contact-name">${data.namaLengkap}</div><div class="contact-phone">${data.telepon}</div></div>
              </div>
              <div class="contact-actions">
                <a href="tel:${data.telepon}" class="btn btn-outline"><i class="fas fa-phone-alt"></i> Call</a>
                <a href="https://wa.me/${waSelf}" target="_blank" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i> WA</a>
              </div>
            </div>

            <p style="font-size: 13px; font-weight: 600; color: var(--text-gray); margin-bottom: 10px; text-transform: uppercase;">Kontak Darurat</p>
            ${data.kontakDarurat.nama && data.kontakDarurat.nama !== '-' ? `
            <div class="contact-item" style="border: none; padding-bottom: 0;">
              <div class="contact-left">
                <div class="contact-avatar" style="background:#fee2e2; color:#ef4444;"><i class="fas fa-heartbeat"></i></div>
                <div><div class="contact-name">${data.kontakDarurat.nama} (${data.kontakDarurat.hubungan})</div><div class="contact-phone">${data.kontakDarurat.telepon}</div></div>
              </div>
              <div class="contact-actions">
                <a href="tel:${data.kontakDarurat.telepon}" class="btn btn-outline"><i class="fas fa-phone-alt"></i> Call</a>
                <a href="https://wa.me/${waEmergency}" target="_blank" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i> WA</a>
              </div>
            </div>
            ` : '<p style="color:var(--text-gray); font-size:14px;">Tidak ada data kontak darurat.</p>'}
          </div>

          <!-- 3. Struktur Perusahaan -->
          <div id="sec-struktur" class="section-card">
            <div class="section-header"><i class="fas fa-sitemap"></i> Struktur Perusahaan</div>
            ${buildOrgChart(data.divisi, data.jabatan, data.namaLengkap)}
          </div>

          <!-- 4. Info Perusahaan -->
          <div id="sec-perusahaan" class="section-card">
            <div class="section-header"><i class="fas fa-building"></i> Info Perusahaan</div>
            <p style="color:var(--text-gray); margin-bottom:20px; font-size:14px;">Akses informasi penting dan kebijakan perusahaan Los Ciken melalui link berikut.</p>
            <a href="https://radipson.github.io/LOSHRISENTERPRISE/" target="_blank" class="btn btn-link">
              <i class="fas fa-link" style="color:var(--primary); width:20px;"></i> Portal Karyawan <i class="fas fa-external-link-alt" style="margin-left:auto; color:var(--text-light); font-size:12px;"></i>
            </a>
            <a href="https://docs.google.com/presentation/d/1OgLeF4CrlMTBOGWkkFsYCSpPiyH6u0eFVsOaznlgXg8/edit?slide=id.g3853d4b8791_0_0#slide=id.g3853d4b8791_0_0" target="_blank" class="btn btn-link">
              <i class="fas fa-shield-alt" style="color:var(--primary); width:20px;"></i> Kebijakan Perusahaan <i class="fas fa-external-link-alt" style="margin-left:auto; color:var(--text-light); font-size:12px;"></i>
            </a>
            <a href="https://docs.google.com/presentation/d/1CjLkemKljY6xKst699ObPyakJdejj3GYB7pf51D7KGU/edit?slide=id.g399b4a40343_0_55#slide=id.g399b4a40343_0_55" target="_blank" class="btn btn-link">
              <i class="fas fa-book" style="color:var(--primary); width:20px;"></i> Buku Panduan <i class="fas fa-external-link-alt" style="margin-left:auto; color:var(--text-light); font-size:12px;"></i>
            </a>
            <a href="https://www.instagram.com/losciken/" target="_blank" class="btn btn-link" style="margin-bottom:0;">
              <i class="fas fa-globe" style="color:var(--primary); width:20px;"></i> Website Los Ciken <i class="fas fa-external-link-alt" style="margin-left:auto; color:var(--text-light); font-size:12px;"></i>
            </a>
          </div>

          <!-- 5. QR & Virtual ID Card -->
          <div id="sec-idcard" class="section-card" style="background: var(--bg-light); border: 2px dashed var(--border); box-shadow: none;">
            <div class="section-header" style="border:none; justify-content:center; margin-bottom: 0;"><i class="fas fa-id-card"></i> QR & Virtual ID Card</div>
            <p style="text-align: center; color: var(--text-gray); font-size: 14px; margin-bottom: 30px;">Pratinjau kartu identitas virtual Anda. Anda dapat mengunduh QR Code atau gambar ID Card lengkap untuk disimpan.</p>
            
            <!-- Beautiful Portrait ID Card Preview -->
            <div id="virtual-id-preview" class="id-card-wrapper">
              <div class="id-card-header">
                <div style="font-weight: 800; font-style: italic; font-size: 26px; margin-bottom: 2px;">Los Ciken</div>
                <div style="font-size: 11px; opacity: 0.9; letter-spacing: 1px;">KARTU IDENTITAS DIGITAL</div>
              </div>
              <div style="height: 8px; background: repeating-linear-gradient(45deg, #0a4f2b, #0a4f2b 10px, #10663a 10px, #10663a 20px);"></div>
              <div class="id-card-body">
                <img src="${data.foto}" crossorigin="anonymous" style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-light); margin-bottom: 20px;" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(data.namaLengkap)}&background=0a4f2b&color=fff&size=150'">
                <h2 style="font-size: 20px; color: var(--text-dark); margin-bottom: 6px; line-height: 1.2;">${data.namaLengkap}</h2>
                <div style="font-size: 14px; font-weight: 600; color: var(--success); margin-bottom: 16px;">${data.jabatan}</div>
                
                <div style="display: inline-block; background: var(--bg-light); padding: 8px 16px; border-radius: 8px; font-family: monospace; font-weight: bold; font-size: 15px; color: var(--text-gray); margin-bottom: 24px; letter-spacing: 1px; border: 1px solid var(--border);">
                  ${data.id}
                </div>
                
                <div style="margin-bottom: 10px;">
                  <div id="qrcode"></div>
                </div>
              </div>
              <div class="id-card-footer">
                Diperbarui pada ${data.tanggalBergabung}<br>
                <span style="opacity: 0.8; font-weight: normal;">Hanya untuk keperluan internal Los Ciken.</span>
              </div>
            </div>

            <!-- Action Buttons -->
            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
              <div class="url-input-group" style="width: 100%; max-width: 320px; margin-top:0;">
                <input type="text" class="url-input" value="${currentUrl}" readonly onclick="this.select()">
                <button class="btn btn-outline" onclick="copyLink()"><i class="fas fa-copy"></i></button>
              </div>
              <div style="display: flex; gap: 10px; width: 100%; max-width: 320px;">
                <button class="btn btn-outline" style="flex:1;" onclick="downloadQR()">
                  <i class="fas fa-qrcode"></i> Unduh QR
                </button>
                <button id="btn-download" class="btn btn-green" style="flex:1;" onclick="downloadVirtualID('${data.id}')">
                  <i class="fas fa-image"></i> Unduh ID Card
                </button>
              </div>
            </div>

          </div>

        </div>
      `;

      // Generate QR Code dynamically inside the Virtual ID Card
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js')
        .then(() => {
          new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 120,
            height: 120,
            colorDark : "#0a4f2b",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
          });
        })
        .catch(err => {
          document.getElementById("qrcode").innerHTML = "<p style='color:red;font-size:12px;'>Gagal memuat QR Code</p>";
        });

      setupScrollSpy();
    }

    function fetchData(id) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${sheetGid}`;
      
      fetch(url)
        .then(res => {
          if (!res.ok) throw new Error("Akses ditolak.");
          return res.text();
        })
        .then(text => {
          const startIndex = text.indexOf('{');
          const endIndex = text.lastIndexOf('}');
          if (startIndex === -1 || endIndex === -1) throw new Error("Sheet diprivate.");
          
          const jsonStr = text.substring(startIndex, endIndex + 1);
          const data = JSON.parse(jsonStr);
          const rows = data.table.rows;
          
          let found = null;
          for (let i = 3; i < rows.length; i++) {
             const row = rows[i].c;
             if (row && row[0] && row[0].v === id) {
               let tgl = '-';
               if (row[16]) tgl = row[16].f || row[16].v || '-';
               let rawFoto = (row[6] && row[6].v) ? String(row[6].v) : '';
               let namaKaryawan = (row[2] && row[2].v) || 'Karyawan';
               let validFoto = rawFoto.startsWith('http') ? rawFoto : ('https://ui-avatars.com/api/?name=' + encodeURIComponent(namaKaryawan) + '&background=0a4f2b&color=fff&size=150');

               found = {
                 id: (row[0] && row[0].v) || '-',
                 namaLengkap: namaKaryawan,
                 email: (row[3] && row[3].v) || '-',
                 telepon: (row[4] && row[4].v) || '-',
                 foto: validFoto,
                 jabatan: (row[14] && row[14].v) || '-',
                 cabang: (row[15] && row[15].v) || '-',
                 tanggalBergabung: String(tgl),
                 status: (row[18] && row[18].v) || '-',
                 divisi: (row[14] && row[14].v) || '-',
                 kontakDarurat: {
                   nama: (row[30] && row[30].v) || '-',
                   hubungan: (row[31] && row[31].v) || '-',
                   telepon: (row[32] && row[32].v) || '-'
                 }
               };
               break;
             }
          }
          
          if (found) renderData(found);
          else showError("Data ID " + id + " tidak ditemukan.");
        })
        .catch(err => {
          console.error(err);
          showError(err.message);
        });
    }
  </script>
</body>
</html>
